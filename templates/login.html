<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ORION Brief — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#04070b;color:#8aaec4;font-family:'IBM Plex Mono',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center}
body::after{content:'';position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 3px)}
.wrap{width:100%;max-width:420px;padding:20px}
.brand{text-align:center;margin-bottom:40px}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:8px;color:#e8f2f8}
.brand-tag{display:inline-block;font-size:7px;letter-spacing:2px;padding:3px 10px;border:1px solid rgba(59,130,246,.3);color:#3b82f6;background:rgba(37,99,235,.08);margin-top:4px}
.brand-sub{font-size:8px;letter-spacing:1.5px;color:#3d5f78;margin-top:8px}
.card{background:#070d12;border:1px solid #1a2e3e;padding:32px}
.card-title{font-size:9px;letter-spacing:2px;color:#3d5f78;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid #1a2e3e}
.field{margin-bottom:16px}
.field label{display:block;font-size:7.5px;letter-spacing:1.5px;color:#3d5f78;margin-bottom:6px}
.field input{width:100%;background:#04070b;border:1px solid #1a2e3e;color:#e8f2f8;font-family:'IBM Plex Mono',monospace;font-size:10px;padding:10px 14px;outline:none;transition:border-color .15s}
.field input:focus{border-color:#3b82f6}
.field input::placeholder{color:#2a4458}
.btn{width:100%;padding:12px;background:#1d4ed8;border:none;color:#e8f2f8;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:2px;cursor:pointer;transition:background .15s;margin-top:8px}
.btn:hover{background:#2563eb}
.error{background:rgba(220,38,38,.08);border:1px solid rgba(239,68,68,.25);color:#ef4444;font-size:8px;letter-spacing:.5px;padding:10px 14px;margin-bottom:16px}
.link-row{text-align:center;margin-top:20px;font-size:8px;color:#3d5f78}
.link-row a{color:#3b82f6;text-decoration:none}
.link-row a:hover{color:#60a5fa}
.hex{display:inline-block;margin-bottom:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="hex">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="6" fill="#2563eb"/>
      </svg>
    </div>
    <div class="brand-name">ORION</div>
    <div class="brand-tag">BRIEF</div>
    <div class="brand-sub">SOUTH ASIA INTELLIGENCE PLATFORM</div>
  </div>

  <div class="card">
    <div class="card-title">ANALYST LOGIN</div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="field">
        <label>EMAIL ADDRESS</label>
        <input type="email" name="email" placeholder="analyst@firm.com" required autocomplete="email">
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn">ACCESS ORION BRIEF →</button>
    </form>
  </div>

  <div class="link-row">
    New analyst? <a href="/register">Create account</a>
    &nbsp;·&nbsp; <a href="/forgot-password">Forgot password?</a>
  </div>
</div>
</body>
</html>
